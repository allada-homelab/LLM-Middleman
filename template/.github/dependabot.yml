# Dependabot — auto-PRs for security advisories and routine version bumps.
#
# Supply-chain hardening:
#
#   1. NO AUTO-MERGE. There is no `auto-merge` field below, and no companion
#      workflow that auto-merges Dependabot PRs. Every PR is hand-reviewed.
#      The dominant attack vector is malicious-publish-via-compromised-
#      maintainer; auto-merge defeats every defense.
#
#   2. Grouped minor + patch updates per-ecosystem so one PR covers a weekly
#      batch (fewer PRs to review). Weekly (not daily) cadence gives the
#      advisory feeds time to flag bad releases before a routine bump lands.
#
#   3. `open-pull-requests-limit` is capped per ecosystem so a flurry of bot
#      PRs never crowds out human work.
#
# Every PR uses `prefix: "chore"` + `include: "scope"`, so Dependabot renders
# `chore(deps): …` / `chore(deps-dev): …` titles — Conventional-Commits clean.
# The `needs-review` label flags each PR as awaiting human eyes.

version: 2
updates:
  # Python dependencies (uv).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"
      - "needs-review"
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions versions in our workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"
      - "needs-review"
    groups:
      actions-minor-and-patch:
        update-types: ["minor", "patch"]

  # Devcontainer base image + features.
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"
      - "needs-review"

  # Docker base images (digest-pinned FROM lines in static Dockerfiles).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "deps"
      - "needs-review"
