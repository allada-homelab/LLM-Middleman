# Path-based PR labels for actions/labeler@v5. Create these labels in the repo
# (or remove rows you don't want). Glob rules are intentionally generic.
docs:
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "**/*.md", "mkdocs.yml"]

tests:
  - changed-files:
      - any-glob-to-any-file: ["tests/**"]

ci:
  - changed-files:
      - any-glob-to-any-file: [".github/**"]

dependencies:
  - changed-files:
      - any-glob-to-any-file: ["pyproject.toml", "uv.lock"]
