name: pre-commit

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  pre-commit:
    runs-on: ${{ vars.CI_RUNNER || 'homelab-runners' }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv run pre-commit run --all-files --show-diff-on-failure
