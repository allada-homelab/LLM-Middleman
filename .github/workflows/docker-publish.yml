name: docker-publish

on:
  push:
    branches: [main]   # publish an edge image on every merge to main
    tags: ["v*"]       # publish a versioned release on v* tags
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to build (e.g. v0.1.0); defaults to an edge build from main."
        required: false

concurrency:
  group: docker-publish-${{ github.event.inputs.tag || github.ref_name }}

  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-push:
    runs-on: ${{ vars.CI_RUNNER || 'homelab-runners' }}

    steps:
      - uses: actions/checkout@v7

      - name: Log in to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}

          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}

          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=edge,branch=main

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

          labels: ${{ steps.meta.outputs.labels }}

          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
