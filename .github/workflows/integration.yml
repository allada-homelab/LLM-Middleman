name: integration

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ${{ vars.CI_RUNNER || 'homelab-runners' }}
    steps:
      - uses: actions/checkout@v7
      - name: Log in to Docker Hub
        # Authenticated pulls lift the anonymous rate limit (100 pulls / 6h
        # per IP, trivially exhausted by a self-hosted runner pool) to 10k/6h.
        # Skipped when secrets are unavailable — falls back to anonymous pulls.
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked --all-extras --all-groups
      - run: uv run pytest tests/integration -m integration --maxfail=1 -q
