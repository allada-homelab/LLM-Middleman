name: hadolint

on:
  push:
    branches: [main]
    paths: ["Dockerfile"]
  pull_request:
    paths: ["Dockerfile"]

permissions:
  contents: read

jobs:
  hadolint:
    runs-on: ${{ vars.CI_RUNNER || 'homelab-runners' }}

    steps:
      - uses: actions/checkout@v7
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
