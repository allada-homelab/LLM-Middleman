name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly run so hassfest re-checks against HA's monthly releases without a push.
  schedule:
    - cron: '15 3 * * 1'

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # @master is HA's documented usage for hassfest; do not pin
      - uses: home-assistant/actions/hassfest@master
